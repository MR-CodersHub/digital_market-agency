<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Analytics | NexusDigital</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="description" content="View advanced metrics, search positions, CTR profiles, and CPC conversion ratios.">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .dashboard-container {
            display: grid;
            grid-template-columns: 260px 1fr;
            min-height: 100vh;
            background: var(--gradient-bg);
        }

        /* Sidebar Styling */
        .sidebar {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(16px);
            border-right: 1px solid var(--glass-border);
            padding: 2.2rem 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .sidebar-menu {
            margin-top: 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.92rem;
            font-weight: 600;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .sidebar-link:hover, .sidebar-link.active {
            color: var(--primary);
            background: rgba(124, 58, 237, 0.08);
        }

        .sidebar-link.active {
            box-shadow: inset 0 0 0 1px rgba(124, 58, 237, 0.15);
        }

        /* Main Content Area */
        .dashboard-content {
            padding: 2.5rem 3rem;
            overflow-y: auto;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        .metric-card-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .metric-sub-box {
            padding: 1.8rem;
            border-radius: 20px;
            box-shadow: var(--glass-shadow);
        }

        .chart-visual-wrapper {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        @media (max-width: 992px) {
            .metric-card-grid {
                grid-template-columns: 1fr;
            }
            .dashboard-container {
                grid-template-columns: 1fr;
            }
            .sidebar {
                display: none;
            }
        }
    <!-- Theme Switcher Flicker Fix -->
    <script>
        (function() {
            const saved = localStorage.getItem('ndTheme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
        })();
    </script>
</head>

<body class="light-theme">
    <div class="dashboard-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div>
                <a href="index.html" class="logo">
                    <div class="logo-icon-wrap">
                        <i class="fa-solid fa-chart-line"></i>
                    </div>
                    <span class="logo-text">Nexus<span>Digital</span></span>
                </a>

                <div class="sidebar-menu">
                    <a href="user-dashboard.html" class="sidebar-link">
                        <i class="fa-solid fa-gauge"></i> Dashboard Overview
                    </a>
                    <a href="campaign-analytics.html" class="sidebar-link active">
                        <i class="fa-solid fa-chart-simple"></i> Campaign Analytics
                    </a>
                    <a href="service-details.html" class="sidebar-link">
                        <i class="fa-solid fa-magnifying-glass"></i> SEO Reports
                    </a>
                    <a href="content-approval.html" class="sidebar-link">
                        <i class="fa-solid fa-share-nodes"></i> Social Media Performance
                    </a>
                    <a href="user-dashboard.html" class="sidebar-link">
                        <i class="fa-solid fa-percent"></i> ROI Tracking
                    </a>
                    <a href="content-approval.html" class="sidebar-link">
                        <i class="fa-regular fa-calendar-days"></i> Content Calendar
                    </a>
                    <a href="support-tickets.html" class="sidebar-link">
                        <i class="fa-solid fa-circle-question"></i> Support Tickets
                    </a>
                    <a href="billing.html" class="sidebar-link">
                        <i class="fa-solid fa-wallet"></i> Billing
                    </a>
                    <a href="settings.html" class="sidebar-link">
                        <i class="fa-solid fa-bell"></i> Notifications
                    </a>
                    <a href="settings.html" class="sidebar-link">
                        <i class="fa-solid fa-sliders"></i> Settings
                    </a>
                </div>
            </div>

            <!-- Profile Info Widget -->
            <div style="background: rgba(255, 255, 255, 0.7); border-radius: 16px; padding: 12px; border: 1px solid var(--glass-border); display:flex; align-items:center; gap:12px;">
                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?ixlib=rb-4.0.3&auto=format&fit=crop&w=100&q=80" alt="Client User" style="width:38px; height:38px; border-radius:50%; object-fit:cover;">
                <div>
                    <h5 style="font-size:0.85rem; margin:0;">Alex Rivera</h5>
                    <p style="font-size:0.72rem; color:var(--text-muted); margin:0;">Client Account</p>
                </div>
                <a href="login.html" style="margin-left:auto; color:var(--text-muted);"><i class="fa-solid fa-arrow-right-from-bracket"></i></a>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="dashboard-content">
            <!-- Top bar -->
            <div class="dashboard-header">
                <div>
                    <span class="badge">Performance Intelligence</span>
                    <h1 style="font-size: 2.2rem; margin-top: 0.2rem;">Campaign <span class="text-gradient">Analytics</span></h1>
                </div>

                <div style="display:flex; align-items:center; gap:12px;">
                    <a href="user-dashboard.html" class="btn btn-outline" style="padding: 8px 16px; font-size: 0.82rem; border-radius: 12px;"><i class="fa-solid fa-chevron-left"></i> Back to Console</a>
                </div>
            </div>

            <!-- Analytical details -->
            <div class="metric-card-grid">
                <!-- Box 1 -->
                <div class="metric-sub-box glass-card">
                    <span style="font-size:0.75rem; color:var(--text-muted); font-weight:700;">Organic Click CTR</span>
                    <h3 style="font-size:2rem; margin:0.5rem 0;">4.85%</h3>
                    <div style="height:6px; background:rgba(0,0,0,0.05); border-radius:10px; overflow:hidden;">
                        <div style="width: 74%; height:100%; background:var(--gradient-primary);"></div>
                    </div>
                    <span style="font-size:0.72rem; color:#10b981; display:block; margin-top:8px;"><i class="fa-solid fa-arrow-up"></i> +1.2% above benchmark</span>
                </div>

                <!-- Box 2 -->
                <div class="metric-sub-box glass-card">
                    <span style="font-size:0.75rem; color:var(--text-muted); font-weight:700;">Avg CPC Spend</span>
                    <h3 style="font-size:2rem; margin:0.5rem 0;">$0.48</h3>
                    <div style="height:6px; background:rgba(0,0,0,0.05); border-radius:10px; overflow:hidden;">
                        <div style="width: 38%; height:100%; background:var(--gradient-primary);"></div>
                    </div>
                    <span style="font-size:0.72rem; color:#10b981; display:block; margin-top:8px;"><i class="fa-solid fa-arrow-down"></i> -14% cheaper acquisition</span>
                </div>

                <!-- Box 3 -->
                <div class="metric-sub-box glass-card">
                    <span style="font-size:0.75rem; color:var(--text-muted); font-weight:700;">Page Retention Time</span>
                    <h3 style="font-size:2rem; margin:0.5rem 0;">3m 42s</h3>
                    <div style="height:6px; background:rgba(0,0,0,0.05); border-radius:10px; overflow:hidden;">
                        <div style="width: 82%; height:100%; background:var(--gradient-primary);"></div>
                    </div>
                    <span style="font-size:0.72rem; color:#10b981; display:block; margin-top:8px;"><i class="fa-solid fa-arrow-up"></i> +28s scroll duration</span>
                </div>
            </div>

            <!-- Visualization map -->
            <div class="chart-visual-wrapper">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
                    <div>
                        <h4 style="margin:0; font-size:1.15rem;">Search Engine Keyword Position Trend</h4>
                        <p style="font-size:0.8rem; color:var(--text-muted); margin:0;">Average organic search result positions</p>
                    </div>
                    <span style="background:rgba(124,58,237,0.1); color:var(--primary); font-size:0.75rem; padding:4px 12px; border-radius:20px; font-weight:700;">Active Audit</span>
                </div>

                <div style="border-bottom:1px solid rgba(0,0,0,0.03); padding:1rem 0; display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:700; font-size:0.9rem;">"digital marketing metrics"</span>
                    <span style="background:#10b981; color:#fff; font-size:0.75rem; padding:2px 8px; border-radius:10px; font-weight:700;">Position #2</span>
                </div>
                <div style="border-bottom:1px solid rgba(0,0,0,0.03); padding:1rem 0; display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:700; font-size:0.9rem;">"3d glassmorphism ui platform"</span>
                    <span style="background:#10b981; color:#fff; font-size:0.75rem; padding:2px 8px; border-radius:10px; font-weight:700;">Position #1</span>
                </div>
                <div style="padding:1rem 0; display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:700; font-size:0.9rem;">"saas creative startup marketing"</span>
                    <span style="background:#f59e0b; color:#fff; font-size:0.75rem; padding:2px 8px; border-radius:10px; font-weight:700;">Position #4</span>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
