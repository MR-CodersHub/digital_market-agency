<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Approval | NexusDigital</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="description" content="Audit draft media guidelines, search copies, and active graphics.">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .dashboard-container {
            display: grid;
            grid-template-columns: 260px 1fr;
            min-height: 100vh;
            background: var(--gradient-bg);
        }

        /* Sidebar Styling */
        .sidebar {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(16px);
            border-right: 1px solid var(--glass-border);
            padding: 2.2rem 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .sidebar-menu {
            margin-top: 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.92rem;
            font-weight: 600;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .sidebar-link:hover, .sidebar-link.active {
            color: var(--primary);
            background: rgba(124, 58, 237, 0.08);
        }

        .sidebar-link.active {
            box-shadow: inset 0 0 0 1px rgba(124, 58, 237, 0.15);
        }

        /* Main Content Area */
        .dashboard-content {
            padding: 2.5rem 3rem;
            overflow-y: auto;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        .approval-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
        }

        .approval-card {
            padding: 2rem;
            border-radius: 24px;
            box-shadow: var(--glass-shadow);
        }

        .preview-box {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            margin: 1.2rem 0;
        }

        @media (max-width: 992px) {
            .approval-grid {
                grid-template-columns: 1fr;
            }
            .dashboard-container {
                grid-template-columns: 1fr;
            }
            .sidebar {
                display: none;
            }
        }
    <!-- Theme Switcher Flicker Fix -->
    <script>
        (function() {
            const saved = localStorage.getItem('ndTheme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
        })();
    </script>
</head>

<body class="light-theme">
    <div class="dashboard-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div>
                <a href="index.html" class="logo">
                    <div class="logo-icon-wrap">
                        <i class="fa-solid fa-chart-line"></i>
                    </div>
                    <span class="logo-text">Nexus<span>Digital</span></span>
                </a>

                <div class="sidebar-menu">
                    <a href="user-dashboard.html" class="sidebar-link">
                        <i class="fa-solid fa-gauge"></i> Dashboard Overview
                    </a>
                    <a href="campaign-analytics.html" class="sidebar-link">
                        <i class="fa-solid fa-chart-simple"></i> Campaign Analytics
                    </a>
                    <a href="service-details.html" class="sidebar-link">
                        <i class="fa-solid fa-magnifying-glass"></i> SEO Reports
                    </a>
                    <a href="content-approval.html" class="sidebar-link">
                        <i class="fa-solid fa-share-nodes"></i> Social Media Performance
                    </a>
                    <a href="user-dashboard.html" class="sidebar-link">
                        <i class="fa-solid fa-percent"></i> ROI Tracking
                    </a>
                    <a href="content-approval.html" class="sidebar-link active">
                        <i class="fa-regular fa-calendar-days"></i> Content Calendar
                    </a>
                    <a href="support-tickets.html" class="sidebar-link">
                        <i class="fa-solid fa-circle-question"></i> Support Tickets
                    </a>
                    <a href="billing.html" class="sidebar-link">
                        <i class="fa-solid fa-wallet"></i> Billing
                    </a>
                    <a href="settings.html" class="sidebar-link">
                        <i class="fa-solid fa-bell"></i> Notifications
                    </a>
                    <a href="settings.html" class="sidebar-link">
                        <i class="fa-solid fa-sliders"></i> Settings
                    </a>
                </div>
            </div>

            <!-- Profile Info Widget -->
            <div style="background: rgba(255, 255, 255, 0.7); border-radius: 16px; padding: 12px; border: 1px solid var(--glass-border); display:flex; align-items:center; gap:12px;">
                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?ixlib=rb-4.0.3&auto=format&fit=crop&w=100&q=80" alt="Client User" style="width:38px; height:38px; border-radius:50%; object-fit:cover;">
                <div>
                    <h5 style="font-size:0.85rem; margin:0;">Alex Rivera</h5>
                    <p style="font-size:0.72rem; color:var(--text-muted); margin:0;">Client Account</p>
                </div>
                <a href="login.html" style="margin-left:auto; color:var(--text-muted);"><i class="fa-solid fa-arrow-right-from-bracket"></i></a>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="dashboard-content">
            <!-- Top bar -->
            <div class="dashboard-header">
                <div>
                    <span class="badge">Content Board</span>
                    <h1 style="font-size: 2.2rem; margin-top: 0.2rem;">Asset <span class="text-gradient">Approval</span></h1>
                </div>

                <div style="display:flex; align-items:center; gap:12px;">
                    <a href="user-dashboard.html" class="btn btn-outline" style="padding: 8px 16px; font-size: 0.82rem; border-radius: 12px;"><i class="fa-solid fa-chevron-left"></i> Back to Console</a>
                </div>
            </div>

            <!-- Approval Grid list -->
            <div class="approval-grid">
                <!-- Card 1 -->
                <div class="approval-card glass-card">
                    <span style="font-size: 0.8rem; font-weight:700; color:var(--text-muted);"><i class="fa-regular fa-image" style="color:var(--primary); margin-right:6px;"></i> Creative Illustration</span>
                    <h3 style="font-size:1.25rem; margin:0.5rem 0;">Lavender 3D Geometric Banner</h3>
                    <p style="font-size:0.82rem; color:var(--text-muted); margin:0;">Primary target: LinkedIn Campaign ads graphic</p>
                    
                    <div class="preview-box" style="text-align:center;">
                        <i class="fa-solid fa-cubes" style="font-size:4rem; color:var(--primary); margin:1rem 0;"></i>
                        <p style="font-size:0.75rem; color:var(--text-muted); margin:0;">illustration_drift_v1.jpg (1920x1080)</p>
                    </div>

                    <div style="display:flex; gap:10px;">
                        <button class="btn btn-primary" style="padding:10px 20px; font-size:0.8rem; border-radius:10px;"><i class="fa-solid fa-check"></i> Approve Release</button>
                        <button class="btn btn-outline" style="padding:10px 20px; font-size:0.8rem; border-radius:10px;"><i class="fa-solid fa-pen"></i> Revision</button>
                    </div>
                </div>

                <!-- Card 2 -->
                <div class="approval-card glass-card">
                    <span style="font-size: 0.8rem; font-weight:700; color:var(--text-muted);"><i class="fa-solid fa-align-left" style="color:var(--primary); margin-right:6px;"></i> Copywriting Copy</span>
                    <h3 style="font-size:1.25rem; margin:0.5rem 0;">SaaS Marketing Retainer landing copy</h3>
                    <p style="font-size:0.82rem; color:var(--text-muted); margin:0;">Primary target: Landing page headline variant B</p>

                    <div class="preview-box">
                        <blockquote style="font-style:italic; font-size:0.88rem; line-height:1.5; color:var(--text-main); margin:0;">"Unleash next-gen analytical conversion velocities with soft luxury neumorphic dashboard systems."</blockquote>
                    </div>

                    <div style="display:flex; gap:10px;">
                        <button class="btn btn-primary" style="padding:10px 20px; font-size:0.8rem; border-radius:10px;"><i class="fa-solid fa-check"></i> Approve Release</button>
                        <button class="btn btn-outline" style="padding:10px 20px; font-size:0.8rem; border-radius:10px;"><i class="fa-solid fa-pen"></i> Revision</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
