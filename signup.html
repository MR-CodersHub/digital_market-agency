<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | NexusDigital</title>
    <meta name="description" content="Join NexusDigital and experience next-gen analytical campaigns.">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            background: var(--gradient-bg);
            position: relative;
            overflow: hidden;
        }

        .auth-banner-side {
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            z-index: 2;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.4);
            border-right: 1px solid var(--glass-border);
        }

        .auth-banner-side::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(124, 58, 237, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124, 58, 237, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        .auth-form-side {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            position: relative;
            z-index: 2;
        }

        .auth-card {
            width: 100%;
            max-width: 440px;
            padding: 3rem;
            border-radius: 24px;
        }

        .auth-input-group {
            margin-bottom: 1.2rem;
            position: relative;
        }

        .auth-input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .auth-input-wrapper {
            position: relative;
        }

        .auth-input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .auth-input-wrapper input {
            width: 100%;
            padding: 14px 14px 14px 44px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            outline: none;
            font-family: var(--font-body);
            font-size: 0.92rem;
            transition: var(--transition);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .auth-input-wrapper input:focus {
            border-color: var(--primary);
            background: #ffffff;
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        .auth-banner-graphic {
            position: relative;
            width: 100%;
            height: 380px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .floating-auth-widget {
            position: absolute;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            box-shadow: var(--glass-shadow);
            animation: float 6s ease-in-out infinite;
        }

        @media (max-width: 992px) {
            .auth-container {
                grid-template-columns: 1fr;
            }
            .auth-banner-side {
                display: none;
            }
        }
    <!-- Theme Switcher Flicker Fix -->
    <script>
        (function() {
            const saved = localStorage.getItem('ndTheme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
        })();
    </script>
</head>

<body class="light-theme">
    <div class="auth-container">
        <!-- Banner Side -->
        <div class="auth-banner-side">
            <a href="index.html" class="logo">
                <div class="logo-icon-wrap">
                    <i class="fa-solid fa-chart-line"></i>
                </div>
                <span class="logo-text">Nexus<span>Digital</span></span>
            </a>

            <div class="auth-banner-content">
                <span class="badge">Futuristic Creative Platform</span>
                <h1 style="font-size: 2.8rem; margin: 1.5rem 0 1rem; line-height:1.1;">Accelerate Your Brand <span class="text-gradient">With Elegant 3D Data</span></h1>
                <p style="color: var(--text-muted); font-size:1.05rem; line-height: 1.6; max-width: 480px;">Experience our neumorphism-inspired client console with real-time campaign widgets, automated SEO indexing status, and unified team feedback pipelines.</p>
            </div>

            <div class="auth-banner-graphic">
                <div class="glow-effect" style="width: 250px; height: 250px; top: 20%; right: 20%;"></div>
                
                <!-- Main Glass Widget -->
                <div class="floating-auth-widget" style="width: 280px; z-index: 2;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 1.2rem;">
                        <span style="font-weight: 700; font-size: 0.9rem;"><i class="fa-solid fa-chart-pie" style="color:var(--primary); margin-right:8px;"></i> Campaign ROAS</span>
                        <span style="background: rgba(16, 185, 129, 0.1); color: #10b981; padding: 2px 8px; border-radius: 20px; font-size: 0.75rem; font-weight:700;">+4.8x</span>
                    </div>
                    <div style="height: 6px; background: rgba(0,0,0,0.05); border-radius: 10px; overflow:hidden; margin-bottom: 1rem;">
                        <div style="width: 82%; height: 100%; background: var(--gradient-primary);"></div>
                    </div>
                    <p style="font-size:0.78rem; color:var(--text-muted); margin:0;">Active budget allocation: 94% optimized</p>
                </div>

                <!-- Secondary widget -->
                <div class="floating-auth-widget" style="width: 200px; bottom: 10%; left: 10%; animation-delay: 2.5s; z-index: 3;">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <div style="width: 36px; height: 36px; border-radius:50%; background:rgba(37,99,235,0.1); display:flex; justify-content:center; align-items:center; color:var(--secondary);">
                            <i class="fa-solid fa-bolt"></i>
                        </div>
                        <div>
                            <h4 style="font-size:0.85rem; margin:0;">32.8k</h4>
                            <p style="font-size:0.7rem; color:var(--text-muted); margin:0;">Monthly Hits</p>
                        </div>
                    </div>
                </div>
            </div>

            <p style="font-size: 0.82rem; color: var(--text-muted);">&copy; 2026 NexusDigital Agency. Minimal Luxury Suite.</p>
        </div>

        <!-- Form Side -->
        <div class="auth-form-side">
            <div class="auth-card glass-card fade-up">
                <div style="text-align: center; margin-bottom: 2rem;">
                    <h2 style="font-size: 1.8rem; margin-bottom: 0.5rem;">Start For Free</h2>
                    <p style="color: var(--text-muted); font-size:0.9rem;">Experience high-fidelity marketing retainers</p>
                </div>

                <form action="user-dashboard.html" method="GET">
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                        <div class="auth-input-group">
                            <label for="fullname">Full Name</label>
                            <div class="auth-input-wrapper">
                                <i class="fa-regular fa-user"></i>
                                <input type="text" id="fullname" placeholder="John Doe" required>
                            </div>
                        </div>
                        <div class="auth-input-group">
                            <label for="email">Work Email</label>
                            <div class="auth-input-wrapper">
                                <i class="fa-regular fa-envelope"></i>
                                <input type="email" id="email" placeholder="name@company.com" required>
                            </div>
                        </div>
                    </div>

                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                        <div class="auth-input-group">
                            <label for="company">Company Name</label>
                            <div class="auth-input-wrapper">
                                <i class="fa-regular fa-building"></i>
                                <input type="text" id="company" placeholder="Acme Corp" required>
                            </div>
                        </div>
                        <div class="auth-input-group">
                            <label for="phone">Phone Number</label>
                            <div class="auth-input-wrapper">
                                <i class="fa-solid fa-phone"></i>
                                <input type="tel" id="phone" placeholder="+1 (555) 000-0000" required>
                            </div>
                        </div>
                    </div>

                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                        <div class="auth-input-group">
                            <label for="password">Password</label>
                            <div class="auth-input-wrapper">
                                <i class="fa-solid fa-lock"></i>
                                <input type="password" id="password" placeholder="At least 8 chars" required>
                            </div>
                        </div>
                        <div class="auth-input-group">
                            <label for="confirm_password">Confirm Password</label>
                            <div class="auth-input-wrapper">
                                <i class="fa-solid fa-lock"></i>
                                <input type="password" id="confirm_password" placeholder="Repeat password" required>
                            </div>
                        </div>
                    </div>

                    <div style="display:flex; align-items:center; gap:8px; margin: 1.2rem 0 1.8rem;">
                        <input type="checkbox" id="agree" required style="accent-color: var(--primary); width:16px; height:16px;">
                        <label for="agree" style="font-size:0.82rem; color: var(--text-muted); cursor:pointer;">I agree to the <a href="#" style="color:var(--primary); font-weight:600;">Terms of Service</a> & <a href="#" style="color:var(--primary); font-weight:600;">Privacy Policy</a></label>
                    </div>

                    <button type="submit" class="btn btn-primary glow-btn w-100" style="padding: 14px 28px; border-radius:12px; border:none; display:flex; justify-content:center; align-items:center; gap:10px; font-weight:600; cursor:pointer;">
                        Create Account <i class="fa-solid fa-rocket"></i>
                    </button>

                    <div style="text-align:center; margin-top:2rem;">
                        <p style="font-size:0.88rem; color: var(--text-muted);">Already have an account? <a href="login.html" style="color:var(--primary); font-weight:700;">Login here</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
