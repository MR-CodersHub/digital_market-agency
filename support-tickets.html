<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Tickets | NexusDigital</title>
    <meta name="description" content="Resolve questions, view retainer sprints, and consult with specialists.">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .dashboard-container {
            display: grid;
            grid-template-columns: 260px 1fr;
            min-height: 100vh;
            background: var(--gradient-bg);
        }

        /* Sidebar Styling */
        .sidebar {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(16px);
            border-right: 1px solid var(--glass-border);
            padding: 2.2rem 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .sidebar-menu {
            margin-top: 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.92rem;
            font-weight: 600;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .sidebar-link:hover, .sidebar-link.active {
            color: var(--primary);
            background: rgba(124, 58, 237, 0.08);
        }

        .sidebar-link.active {
            box-shadow: inset 0 0 0 1px rgba(124, 58, 237, 0.15);
        }

        /* Main Content Area */
        .dashboard-content {
            padding: 2.5rem 3rem;
            overflow-y: auto;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        .chat-layout {
            display: grid;
            grid-template-columns: 1fr 1.8fr;
            gap: 2rem;
        }

        .chat-list-card {
            padding: 1.5rem;
            border-radius: 20px;
            box-shadow: var(--glass-shadow);
        }

        .message-stream {
            background: rgba(255, 255, 255, 0.75);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            height: 420px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: var(--glass-shadow);
        }

        .msg-bubble {
            padding: 10px 16px;
            border-radius: 16px;
            max-width: 80%;
            font-size: 0.88rem;
            line-height: 1.4;
        }

        .msg-client {
            background: var(--gradient-primary);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .msg-manager {
            background: rgba(0,0,0,0.04);
            color: var(--text-main);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        @media (max-width: 992px) {
            .chat-layout {
                grid-template-columns: 1fr;
            }
            .dashboard-container {
                grid-template-columns: 1fr;
            }
            .sidebar {
                display: none;
            }
        }
    <!-- Theme Switcher Flicker Fix -->
    <script>
        (function() {
            const saved = localStorage.getItem('ndTheme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
        })();
    </script>
</head>

<body class="light-theme">
    <div class="dashboard-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div>
                <a href="index.html" class="logo">
                    <div class="logo-icon-wrap">
                        <i class="fa-solid fa-chart-line"></i>
                    </div>
                    <span class="logo-text">Nexus<span>Digital</span></span>
                </a>

                <div class="sidebar-menu">
                    <a href="user-dashboard.html" class="sidebar-link">
                        <i class="fa-solid fa-gauge"></i> Dashboard Overview
                    </a>
                    <a href="campaign-analytics.html" class="sidebar-link">
                        <i class="fa-solid fa-chart-simple"></i> Campaign Analytics
                    </a>
                    <a href="service-details.html" class="sidebar-link">
                        <i class="fa-solid fa-magnifying-glass"></i> SEO Reports
                    </a>
                    <a href="content-approval.html" class="sidebar-link">
                        <i class="fa-solid fa-share-nodes"></i> Social Media Performance
                    </a>
                    <a href="user-dashboard.html" class="sidebar-link">
                        <i class="fa-solid fa-percent"></i> ROI Tracking
                    </a>
                    <a href="content-approval.html" class="sidebar-link">
                        <i class="fa-regular fa-calendar-days"></i> Content Calendar
                    </a>
                    <a href="support-tickets.html" class="sidebar-link active">
                        <i class="fa-solid fa-circle-question"></i> Support Tickets
                    </a>
                    <a href="billing.html" class="sidebar-link">
                        <i class="fa-solid fa-wallet"></i> Billing
                    </a>
                    <a href="settings.html" class="sidebar-link">
                        <i class="fa-solid fa-bell"></i> Notifications
                    </a>
                    <a href="settings.html" class="sidebar-link">
                        <i class="fa-solid fa-sliders"></i> Settings
                    </a>
                </div>
            </div>

            <!-- Profile Info Widget -->
            <div style="background: rgba(255, 255, 255, 0.7); border-radius: 16px; padding: 12px; border: 1px solid var(--glass-border); display:flex; align-items:center; gap:12px;">
                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?ixlib=rb-4.0.3&auto=format&fit=crop&w=100&q=80" alt="Client User" style="width:38px; height:38px; border-radius:50%; object-fit:cover;">
                <div>
                    <h5 style="font-size:0.85rem; margin:0;">Alex Rivera</h5>
                    <p style="font-size:0.72rem; color:var(--text-muted); margin:0;">Client Account</p>
                </div>
                <a href="login.html" style="margin-left:auto; color:var(--text-muted);"><i class="fa-solid fa-arrow-right-from-bracket"></i></a>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="dashboard-content">
            <!-- Top bar -->
            <div class="dashboard-header">
                <div>
                    <span class="badge">Messaging Hub</span>
                    <h1 style="font-size: 2.2rem; margin-top: 0.2rem;">Support <span class="text-gradient">Tickets</span></h1>
                </div>

                <div style="display:flex; align-items:center; gap:12px;">
                    <a href="user-dashboard.html" class="btn btn-outline" style="padding: 8px 16px; font-size: 0.82rem; border-radius: 12px;"><i class="fa-solid fa-chevron-left"></i> Back to Console</a>
                </div>
            </div>

            <!-- Chat / Message stream Layout -->
            <div class="chat-layout">
                <!-- Left: Ticket lists -->
                <div class="chat-list-card glass-card">
                    <h4 style="margin-bottom:1.2rem; font-size:1rem;">Your Conversations</h4>
                    
                    <div style="display:flex; flex-direction:column; gap:0.8rem;">
                        <!-- Ticket 1 -->
                        <div style="background:rgba(124, 58, 237, 0.05); border:1px solid rgba(124, 58, 237, 0.15); border-radius:12px; padding:12px; display:flex; align-items:center; gap:12px; cursor:pointer;">
                            <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?ixlib=rb-4.0.3&auto=format&fit=crop&w=100&q=80" alt="Lead Specialist" style="width:36px; height:36px; border-radius:50%; object-fit:cover;">
                            <div>
                                <h5 style="font-size:0.85rem; margin:0;">Sarah Jenkins</h5>
                                <p style="font-size:0.7rem; color:var(--text-muted); margin:0;">Active: Keyword index check...</p>
                            </div>
                            <span style="width:8px; height:8px; background:var(--primary); border-radius:50%; margin-left:auto;"></span>
                        </div>

                        <!-- Ticket 2 -->
                        <div style="border:1px solid rgba(0, 0, 0, 0.04); border-radius:12px; padding:12px; display:flex; align-items:center; gap:12px; cursor:pointer; opacity:0.6;">
                            <div style="width:36px; height:36px; border-radius:50%; background:rgba(0,0,0,0.05); display:flex; justify-content:center; align-items:center;"><i class="fa-solid fa-circle-question"></i></div>
                            <div>
                                <h5 style="font-size:0.85rem; margin:0;">Platform Billing</h5>
                                <p style="font-size:0.7rem; color:var(--text-muted); margin:0;">Closed: April invoice check</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right: Message dialogue stream -->
                <div class="message-stream">
                    <!-- Stream header -->
                    <div style="display:flex; align-items:center; gap:12px; border-bottom:1px solid rgba(0,0,0,0.03); padding-bottom:12px;">
                        <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?ixlib=rb-4.0.3&auto=format&fit=crop&w=100&q=80" alt="Sarah Jenkins" style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                        <div>
                            <h4 style="font-size:0.95rem; margin:0;">Sarah Jenkins</h4>
                            <p style="font-size:0.72rem; color:#10b981; margin:0;"><i class="fa-solid fa-circle" style="font-size:0.5rem; margin-right:4px;"></i> Online and ready to consult</p>
                        </div>
                    </div>

                    <!-- Bubbles stream -->
                    <div style="display:flex; flex-direction:column; gap:1.2rem; flex:1; margin: 1.5rem 0; overflow-y:auto;">
                        <!-- Msg 1 -->
                        <div class="msg-bubble msg-manager">
                            Hello Alex! I've audited the SEO keywords for Acme Corporation and mapped out 14 new clusters for the technical audit copy.
                        </div>

                        <!-- Msg 2 -->
                        <div class="msg-bubble msg-client">
                            Amazing Sarah! Let me know if you need our team to audit the draft copy variant B before Friday.
                        </div>
                    </div>

                    <!-- Input line -->
                    <div style="display:flex; gap:10px; background:rgba(0,0,0,0.03); border-radius:14px; padding:6px 12px; align-items:center;">
                        <input type="text" placeholder="Consult or write question..." style="flex:1; background:transparent; border:none; outline:none; font-family:var(--font-body); font-size:0.88rem; color:var(--text-main);">
                        <button style="width:36px; height:36px; border-radius:50%; background:var(--gradient-primary); border:none; color:#fff; display:flex; justify-content:center; align-items:center; cursor:pointer;"><i class="fa-solid fa-paper-plane" style="font-size:0.8rem;"></i></button>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
